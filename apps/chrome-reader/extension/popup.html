<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="cr-popup">
    <div class="cr-header">
      <span class="cr-title">Chrome Reader</span>
      <span class="cr-status" id="engine-status" title="Local Kokoro status"></span>
    </div>

    <!-- Transport Controls -->
    <div class="cr-transport">
      <button id="btn-prev" class="cr-btn" title="Previous paragraph">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button id="btn-play" class="cr-btn cr-btn-play" title="Play / Pause (Alt+R)">
        <svg id="icon-play" viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" width="24" height="24" style="display:none"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button id="btn-next" class="cr-btn" title="Next paragraph">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      <button id="btn-stop" class="cr-btn" title="Stop (Alt+S)">
        <svg viewBox="0 0 24 24" width="18" height="18"><rect fill="currentColor" x="6" y="6" width="12" height="12" rx="1"/></svg>
      </button>
    </div>

    <div class="cr-progress-row">
      <span id="progress-text" class="cr-progress-label">Ready</span>
    </div>
    <div class="cr-progress-row">
      <span id="engine-text" class="cr-engine-label">Local Kokoro loads on first play</span>
    </div>

    <div class="cr-divider"></div>

    <!-- Read Mode -->
    <div class="cr-section">
      <label class="cr-label">Read Mode</label>
      <select id="sel-mode" class="cr-select">
        <option value="smart">Smart (auto-detect)</option>
        <option value="selection">Selection</option>
        <option value="visible">Visible area</option>
        <option value="full">Full page</option>
        <option value="headings">Headings only</option>
      </select>
    </div>

    <!-- Voice -->
    <div class="cr-section">
      <label class="cr-label">Voice</label>
      <select id="sel-voice" class="cr-select">
        <option value="af_heart">Heart (F, US)</option>
        <option value="af_bella">Bella (F, US)</option>
        <option value="am_fenrir">Fenrir (M, US)</option>
        <option value="bf_emma">Emma (F, UK)</option>
        <option value="bm_fable">Fable (M, UK)</option>
      </select>
    </div>

    <!-- Speed -->
    <div class="cr-section">
      <label class="cr-label">Speed: <span id="speed-value">1.0x</span></label>
      <input type="range" id="slider-speed" class="cr-slider" min="0.5" max="3" step="0.25" value="1">
    </div>

    <div class="cr-divider"></div>

    <!-- Options -->
    <div class="cr-options">
      <label class="cr-checkbox">
        <input type="checkbox" id="opt-skip-code" checked>
        <span>Skip code blocks</span>
      </label>
      <label class="cr-checkbox">
        <input type="checkbox" id="opt-auto-scroll" checked>
        <span>Auto-scroll</span>
      </label>
      <label class="cr-checkbox">
        <input type="checkbox" id="opt-highlight" checked>
        <span>Highlight words</span>
      </label>
    </div>

    <div class="cr-divider"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
